services:
  # API Server (production mode)
  api:
    # Use published image (recommended)
    image: ghcr.io/impact-idol/chatsdk/api:latest
    # Or build from source (for custom modifications):
    # build:
    #   context: ../
    #   dockerfile: docker/Dockerfile.api
    #   target: production
    ports:
      - "127.0.0.1:${API_PORT:-5500}:5500"
    environment:
      NODE_ENV: production
      PORT: 5500

      # Database Configuration (use managed PostgreSQL in production)
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL for the production database}
      DATABASE_SSL: ${DATABASE_SSL:-true}
      REQUIRE_FLYWAY_HISTORY: ${REQUIRE_FLYWAY_HISTORY:-true}

      # S3-Compatible Storage (AWS S3, DigitalOcean Spaces, Cloudflare R2, etc.)
      S3_ENDPOINT: ${S3_ENDPOINT:?Set S3_ENDPOINT for production uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID for production uploads}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY for production uploads}
      S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET for production uploads}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}  # CDN URL if applicable

      # Centrifugo Configuration (use managed or dedicated instance)
      CENTRIFUGO_URL: ${CENTRIFUGO_URL:-ws://centrifugo:8000/connection/websocket}
      CENTRIFUGO_API_URL: ${CENTRIFUGO_API_URL:-http://centrifugo:8000/api}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:?Set CENTRIFUGO_API_KEY}
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET:?Set CENTRIFUGO_TOKEN_SECRET}

      # Inngest Configuration (required in production)
      REQUIRE_INNGEST: ${REQUIRE_INNGEST:-true}
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?Set INNGEST_EVENT_KEY}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?Set INNGEST_SIGNING_KEY}

      # Redis Configuration (required for production rate limiting unless explicitly waived)
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TLS: ${REDIS_TLS:-true}

      # Meilisearch Configuration (optional; readiness reports skipped when unset)
      MEILISEARCH_HOST: ${MEILISEARCH_HOST:-}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-}

      # JWT Secrets
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_KEY_ID: ${JWT_KEY_ID:?Set JWT_KEY_ID}

      # Optional: OpenAI for AI features
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS}
      CENTRIFUGO_ALLOWED_ORIGINS: ${CENTRIFUGO_ALLOWED_ORIGINS:?Set CENTRIFUGO_ALLOWED_ORIGINS}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5500/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - chatsdk-network

  # Centrifugo (real-time WebSocket server)
  centrifugo:
    image: centrifugo/centrifugo:v5
    ports:
      - "127.0.0.1:${CENTRIFUGO_PORT:-8000}:8000"
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_SECRET:?Set CENTRIFUGO_TOKEN_SECRET}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:?Set CENTRIFUGO_API_KEY}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD:-}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET:-}
      CENTRIFUGO_ALLOWED_ORIGINS: ${CENTRIFUGO_ALLOWED_ORIGINS:?Set CENTRIFUGO_ALLOWED_ORIGINS}
      CENTRIFUGO_LOG_LEVEL: ${CENTRIFUGO_LOG_LEVEL:-info}
    volumes:
      - ./centrifugo.prod.json:/centrifugo/config.json:ro
    command: centrifugo --config=/centrifugo/config.json
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - chatsdk-network

  # One-shot Flyway migration runner for external production databases.
  # Run before API rollout:
  #   docker compose -f docker/docker-compose.prod.yml --profile migrate run --rm flyway
  flyway:
    image: flyway/flyway:10-alpine
    profiles:
      - migrate
    command: -connectRetries=60 -baselineOnMigrate=true migrate
    volumes:
      - ./migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: ${FLYWAY_URL:-}
      FLYWAY_USER: ${FLYWAY_USER:-}
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD:-}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}
      FLYWAY_BASELINE_DESCRIPTION: ${FLYWAY_BASELINE_DESCRIPTION:-Initial schema from init-db.sql}
      FLYWAY_SCHEMAS: ${FLYWAY_SCHEMAS:-public}
      FLYWAY_VALIDATE_ON_MIGRATE: "true"
      FLYWAY_OUT_OF_ORDER: "false"
      FLYWAY_CLEAN_DISABLED: "true"
    networks:
      - chatsdk-network

  # Reverse Proxy (optional - can use external load balancer)
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates
    depends_on:
      - api
      - centrifugo
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - chatsdk-network

networks:
  chatsdk-network:
    driver: bridge

# Note: In production, use external managed services for:
# - PostgreSQL (AWS RDS, DigitalOcean Managed Databases, etc.)
# - S3 Storage (AWS S3, DigitalOcean Spaces, Cloudflare R2, etc.)
# - Redis (AWS ElastiCache, Redis Cloud, etc.)
# - Optionally: Centrifugo as a managed service or dedicated instance

# Secrets Management:
# - Use Docker secrets for sensitive data
# - Or use environment variable injection from CI/CD
# - Or use external secret managers (AWS Secrets Manager, HashiCorp Vault, etc.)
