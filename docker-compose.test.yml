services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: chatsdk-test-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: chatsdk
      POSTGRES_PASSWORD: chatsdk_test_123
      POSTGRES_DB: chatsdk
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatsdk"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    container_name: chatsdk-test-flyway
    command: -url=jdbc:postgresql://postgres:5432/chatsdk -user=chatsdk -password=chatsdk_test_123 -connectRetries=30 migrate
    volumes:
      - ./docker/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Redis - Caching & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: chatsdk-test-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass chatsdk_redis_test_123
    volumes:
      - test_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: chatsdk-test-minio
    restart: unless-stopped
    ports:
      - "9007:9000"
      - "9008:9001"
    environment:
      MINIO_ROOT_USER: chatsdk
      MINIO_ROOT_PASSWORD: chatsdk_minio_test_123
    volumes:
      - test_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: chatsdk-test-minio-init
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 chatsdk chatsdk_minio_test_123 &&
      mc mb --ignore-existing local/chatsdk &&
      mc version enable local/chatsdk &&
      mc anonymous set none local/chatsdk
      "
    depends_on:
      minio:
        condition: service_healthy

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: chatsdk-test-meilisearch
    restart: unless-stopped
    ports:
      - "7701:7700"
    environment:
      MEILI_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef
      MEILI_ENV: development
    volumes:
      - test_meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Centrifugo - Real-time WebSocket Server
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: chatsdk-test-centrifugo
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: fedcba9876543210FEDCBAfedcba9876543210FEDCBA
      CENTRIFUGO_API_KEY: 0123456789abcdefABCDEF0123456789abcdefABCDEF
      CENTRIFUGO_ADMIN_PASSWORD: test_admin_pass_123
      CENTRIFUGO_ADMIN_SECRET: test_admin_secret_123
      CENTRIFUGO_LOG_LEVEL: info
      CENTRIFUGO_ALLOWED_ORIGINS: http://localhost:3000 http://localhost:5501
    volumes:
      - ./docker/centrifugo.json:/centrifugo/config.json
    command: centrifugo --config=/centrifugo/config.json
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  # Inngest Dev Server
  inngest:
    image: inngest/inngest:latest
    container_name: chatsdk-test-inngest
    restart: unless-stopped
    ports:
      - "8289:8288"
    environment:
      INNGEST_DEV: "true"
      INNGEST_LOG_LEVEL: "info"
    command: inngest dev -u http://api:5500/api/inngest --no-discovery
    volumes:
      - test_inngest_data:/var/lib/inngest

  # ChatSDK API Server
  api:
    image: chatsdk-api:latest
    container_name: chatsdk-test-api
    ports:
      - "5501:5500"
    environment:
      NODE_ENV: production
      PORT: 5500
      LOG_LEVEL: info

      # Database
      DATABASE_URL: postgresql://chatsdk:chatsdk_test_123@postgres:5432/chatsdk
      DATABASE_SSL: "false"
      ALLOW_INSECURE_DATABASE_TRANSPORT: "true"
      REQUIRE_FLYWAY_HISTORY: "true"

      # MinIO S3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: chatsdk
      S3_SECRET_ACCESS_KEY: chatsdk_minio_test_123
      S3_BUCKET: chatsdk
      S3_PUBLIC_URL: http://localhost:9007/chatsdk
      S3_USE_SSL: "false"

      # Centrifugo
      CENTRIFUGO_URL: ws://centrifugo:8000/connection/websocket
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: 0123456789abcdefABCDEF0123456789abcdefABCDEF
      CENTRIFUGO_TOKEN_SECRET: fedcba9876543210FEDCBAfedcba9876543210FEDCBA
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5501
      CENTRIFUGO_ALLOWED_ORIGINS: http://localhost:3000 http://localhost:5501

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: chatsdk_redis_test_123
      REDIS_TLS: "false"

      # Meilisearch
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef
      SEARCH_TASK_TIMEOUT_MS: 5000

      # Inngest
      INNGEST_EVENT_KEY: test_inngest_event_key_123
      INNGEST_SIGNING_KEY: test_inngest_signing_key_123

      # JWT
      JWT_SECRET: 89abcdef01234567ABCDEF89abcdef01234567ABCDEF
      JWT_KEY_ID: test-key-2026-06

      # Metrics
      METRICS_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5500/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      centrifugo:
        condition: service_started
      meilisearch:
        condition: service_healthy

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: chatsdk-test-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - test_prometheus_data:/prometheus
    depends_on:
      - api

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: chatsdk-test-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - test_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  test_postgres_data:
  test_redis_data:
  test_minio_data:
  test_inngest_data:
  test_meilisearch_data:
  test_prometheus_data:
  test_grafana_data:
